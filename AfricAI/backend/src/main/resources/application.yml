server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/learning-app}

# Custom application properties
app:
  jwt:
    secret: ${JWT_SECRET:default-super-secret-key-that-should-be-changed-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173} # Default Vite dev server ports

  # --- Mocking Configuration ---
  # Set to 'true' to serve mock data from controllers instead of hitting the DB.
  # This is useful for frontend development without a running database.
  use-mock-data: ${USE_MOCK_DATA:false}
